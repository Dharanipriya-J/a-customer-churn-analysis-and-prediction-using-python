<!DOCTYPE html>
<html>

<head>

<title>Churn Guard</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="header">

<h1>CHURN GUARD</h1>

<p>Customer Churn Analysis and Prediction System</p>

</div>


<div class="container">


<div class="card">

<h2>Manual Prediction</h2>

<form id="predictionForm">

<label>Gender</label>

<select id="gender" required>

<option value="">Select Gender</option>

<option value="Male">Male</option>

<option value="Female">Female</option>

</select>


<label>Tenure (months)</label>

<input type="number"
id="tenure"
placeholder="Enter tenure"
required>


<label>Monthly Charges</label>

<input type="number"
id="monthly"
placeholder="Enter monthly charges"
required>


<label>Total Charges</label>

<input type="number"
id="total"
placeholder="Enter total charges"
required>


<label>Payment Method</label>

<select id="payment_method">

<option value="">Select Payment</option>

<option>Credit Card</option>

<option>Debit Card</option>

<option>UPI</option>

<option>Net Banking</option>

</select>


<button
type="submit"
class="btn">

PREDICT CHURN

</button>

</form>


<div id="resultBox"
class="result-box">

</div>

</div>



<div class="card">

<h2>CSV Upload Prediction</h2>

<form id="uploadForm">

<input type="file"
id="csvFile"
required>

<button
type="submit"
class="btn">

UPLOAD CSV

</button>

</form>


<table>

<thead>

<tr>

<th>Customer ID</th>

<th>Tenure</th>

<th>Monthly</th>

<th>Total</th>

<th>Churn</th>

<th>Risk</th>

<th>Suggestion</th>

</tr>

</thead>


<tbody id="tableBody">

</tbody>

</table>

</div>



<div class="card"

id="analyticsSection"

style="display:none">

<h2>Analytics</h2>

<div class="chart-container">

<div>

<h3>Churn Distribution</h3>

<canvas id="churnChart"></canvas>

</div>


<div>

<h3>Monthly Comparison</h3>

<canvas id="monthlyChart"></canvas>

</div>

</div>

</div>


</div>


<script src="{{ url_for('static',filename='app.js') }}"></script>

</body>

</html>
